<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Portal</title>

<link rel="stylesheet" href="stylee.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>

<div id="loginpage">

    <div class="loginoptions" id="loginoptions">
        <h2>College Portal</h2>
        <button type="button" class="studentbtn" onclick="showStudentLogin()">Student</button>
        <button type="button" class="companybtn" onclick="showCompanyLogin()">Company</button>
    </div>

    <div class="studentlogin" id="studentlogin" style="display:none;">
        <h2>Student Login</h2>
        <div id="student_login_msg" class="form-msg"></div>

        <label>Username :</label>
        <input type="text" id="student_login_username" placeholder="Username">

        <label>Password :</label>
        <input type="password" id="student_login_password" placeholder="Password">

        <button type="button" class="loginbtn" onclick="studentLogin()">Login</button>
        <button type="button" class="backbtn" onclick="showOptions()">Back</button>

        <p>
            Don't have an account?
            <a href="#" onclick="showStudentRegister()">Register here</a>
        </p>
    </div>

    <div class="companylogin" id="companylogin" style="display:none;">
        <h2>Company Login</h2>
        <div id="company_login_msg" class="form-msg"></div>

        <label>Company Name :</label>
        <input type="text" id="company_login_name" placeholder="Company Name">

        <label>Password :</label>
        <input type="password" id="company_login_password" placeholder="Password">

        <button type="button" class="loginbtn" onclick="companyLogin()">Login</button>
        <button type="button" class="backbtn" onclick="showOptions()">Back</button>

        <p>
            Don't have an account?
            <a href="#" onclick="showCompanyRegister()">Register here</a>
        </p>
    </div>

    <div class="studentregister" id="studentregister" style="display:none;">
        <h2>Student Registration</h2>
        <div id="student_reg_msg" class="form-msg"></div>

        <label>Full Name :</label>
        <input type="text" id="student_reg_fullname" placeholder="Full Name">

        <label>Department :</label>
        <input type="text" id="student_reg_department" placeholder="Department">

        <label>Phone Number :</label>
        <input type="number" id="student_reg_phone" placeholder="Phone Number">

        <label>Username :</label>
        <input type="text" id="student_reg_username" placeholder="Username">

        <label>Email :</label>
        <input type="email" id="student_reg_email" placeholder="Email">

        <label>Password :</label>
        <input type="password" id="student_reg_password" placeholder="Password">

        <button type="button" class="registerbtn" onclick="studentRegister()">Create Student Account</button>
        <button type="button" class="backbtn" onclick="showOptions()">Back</button>

        <p>
            Already have an account?
            <a href="#" onclick="showStudentLogin()">Login here</a>
        </p>
    </div>

    <div class="companyregister" id="companyregister" style="display:none;">
        <h2>Company Registration</h2>
        <div id="company_reg_msg" class="form-msg"></div>

        <label>Company Name :</label>
        <input type="text" id="company_reg_name" placeholder="Company Name">

        <label>Email :</label>
        <input type="email" id="company_reg_email" placeholder="Email">

        <label>Password :</label>
        <input type="password" id="company_reg_password" placeholder="Password">

        <button type="button" class="registerbtn" onclick="companyRegister()">Register Company <i class="fa-solid fa-arrow-right"></i></button>
        <button type="button" class="backbtn" onclick="showOptions()">Back</button>

        <p>
            Already have an account?
            <a href="#" onclick="showCompanyLogin()">Login here</a>
        </p>
    </div>

</div>

<script src="stylee.js"></script>
</body>
</html>
