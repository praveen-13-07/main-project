<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Portal</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="neo_brutalism.css">


    <style>
        /* Page-specific minor overrides only */
    </style>

</head>

<body>

    <div id="loginpage">

        <div class="loginoptions" id="loginoptions">
            <h2>College Portal</h2>
            <button type="button" class="studentbtn" onclick="showStudentLogin()">Student</button>
            <button type="button" class="companybtn" onclick="showCompanyLogin()">Company</button>
        </div>

        <div class="studentlogin" id="studentlogin" style="display:none;">
            <h2>Student Login</h2>
            <div id="student_login_msg" class="form-msg"></div>

            <label>Username :</label>
            <input type="text" id="student_login_username" placeholder="Username">

            <label>Password :</label>
            <input type="password" id="student_login_password" placeholder="Password">

            <button type="button" class="loginbtn" onclick="studentLogin()">Login</button>
            <button type="button" class="backbtn" onclick="showOptions()">Back</button>

            <p>
                Don't have an account?<br>
                <a href="#" class="registerherebtn"  onclick="showStudentRegister()"> Register here</a>
            </p>
        </div>

        <div class="companylogin" id="companylogin" style="display:none;">
            <h2>Company Login</h2>
            <div id="company_login_msg" class="form-msg"></div>

            <label>Company Name :</label>
            <input type="text" id="company_login_name" placeholder="Company Name">

            <label>Password :</label>
            <input type="password" id="company_login_password" placeholder="Password">

            <button type="button" class="loginbtn" onclick="companyLogin()">Login</button>
            <button type="button" class="backbtn" onclick="showOptions()">Back</button>

            <p>
                Don't have an account?<br>
                <a href="#" class="registerherebtn" onclick="showCompanyRegister()">Register here</a>
            </p>
        </div>

        <div class="studentregister" id="studentregister" style="display:none;">
            <h2>Student Registration</h2>
            <div id="student_reg_msg" class="form-msg"></div>

            <label>Full Name :</label>
            <input type="text" id="student_reg_fullname" placeholder="Full Name">

            <label>Department :</label>
            <input type="text" id="student_reg_department" placeholder="Department">

            <label>Phone Number :</label>
            <input type="number" id="student_reg_phone" placeholder="Phone Number">

            <label>Username :</label>
            <input type="text" id="student_reg_username" placeholder="Username">

            <label>Email :</label>
            <input type="email" id="student_reg_email" placeholder="Email">

            <label>Password :</label>
            <input type="password" id="student_reg_password" placeholder="Password">

            <button type="button" class="registerbtn" onclick="studentRegister()">Create Student Account</button>
            <button type="button" class="backbtn" onclick="showOptions()">Back</button>

            <p>
                Already have an account?<br>
                <a href="#" class="loginherebtn" onclick="showStudentLogin()">Login here</a>
            </p>
        </div>

        <div class="companyregister" id="companyregister" style="display:none;">
            <h2>Company Registration</h2>
            <div id="company_reg_msg" class="form-msg"></div>

            <label>Company Name :</label>
            <input type="text" id="company_reg_name" placeholder="Company Name">

            <label>Email :</label>
            <input type="email" id="company_reg_email" placeholder="Email">

            <label>Password :</label>
            <input type="password" id="company_reg_password" placeholder="Password">

            <button type="button" class="registerbtn" onclick="companyRegister()">Register Company <i
                    class="fa-solid fa-arrow-right"></i></button>
            <button type="button" class="backbtn" onclick="showOptions()">Back</button>

            <p>
                Already have an account? <br>
                <a href="#" class="loginherebtn" onclick="showCompanyLogin()">Login here</a>
            </p>
        </div>

    </div>

    <script>

        // =================== Hide Forms ===================
        function hideForms() {
            document.getElementById("studentlogin").style.display = "none";
            document.getElementById("companylogin").style.display = "none";
            document.getElementById("studentregister").style.display = "none";
            document.getElementById("companyregister").style.display = "none";
            document.getElementById("loginoptions").style.display = "none";

            // Clear any previous messages when switching forms
            let msgs = document.querySelectorAll('.form-msg');
            msgs.forEach(m => m.style.display = 'none');
        }

        // =================== Message Helper ===================
        function showMsg(id, text, isError = true) {
            let msgDiv = document.getElementById(id);
            msgDiv.innerText = text;
            msgDiv.className = isError ? "form-msg msg-error" : "form-msg msg-success";
            msgDiv.style.display = "block";
        }

        // =================== Show Forms ===================
        function showStudentLogin() {
            hideForms();
            document.getElementById("studentlogin").style.display = "block";
        }

        function showCompanyLogin() {
            hideForms();
            document.getElementById("companylogin").style.display = "block";
        }

        function showStudentRegister() {
            hideForms();
            document.getElementById("studentregister").style.display = "block";
        }

        function showCompanyRegister() {
            hideForms();
            document.getElementById("companyregister").style.display = "block";
        }

        function showOptions() {
            hideForms();
            document.getElementById("loginoptions").style.display = "block";

            // Clear student registration fields when going back to options

            document.getElementById("student_reg_fullname").value = "";
            document.getElementById("student_reg_department").value = "";
            document.getElementById("student_reg_phone").value = "";
            document.getElementById("student_reg_username").value = "";
            document.getElementById("student_reg_email").value = "";
            document.getElementById("student_reg_password").value = "";

            // Clear student login fields when going back to options

            document.getElementById("student_login_username").value = "";
            document.getElementById("student_login_password").value = "";

            // Clear company registration fields when going back to options

            document.getElementById("company_reg_name").value = "";
            document.getElementById("company_reg_email").value = "";
            document.getElementById("company_reg_password").value = "";

            // Clear company login fields when going back to options

            document.getElementById("company_login_name").value = "";
            document.getElementById("company_login_password").value = "";
        }

        // =================== Student Registration ===================
        function studentRegister() {
            let fullname = document.getElementById("student_reg_fullname").value;
            let department = document.getElementById("student_reg_department").value;
            let phone = document.getElementById("student_reg_phone").value;
            let username = document.getElementById("student_reg_username").value;
            let email = document.getElementById("student_reg_email").value;
            let password = document.getElementById("student_reg_password").value;

            if (!username || !password) {
                showMsg("student_reg_msg", "Username and password are required!");
                return;
            }

            let students = JSON.parse(localStorage.getItem("students")) || [];

            if (students.find(s => s.username === username)) {
                showMsg("student_reg_msg", "Username already exists!");
                return;
            }

            students.push({ fullname, department, phone, email, username, password });
            localStorage.setItem("students", JSON.stringify(students));

            showMsg("student_reg_msg", "Account created! Redirecting to login...", false);

            // Wait a moment so the user sees the success message before switching
            setTimeout(() => {
                showStudentLogin();
            }, 1500);
        }

        // =================== Student Login ===================
        function studentLogin() {
            let username = document.getElementById("student_login_username").value;
            let password = document.getElementById("student_login_password").value;

            let students = JSON.parse(localStorage.getItem("students")) || [];
            let found = students.find(s => s.username === username && s.password === password);

            if (found) {
                showMsg("student_login_msg", "Login successful! Welcome.",false);
                setTimeout(() => {
                    window.location.href = "student_main.html";
                }, 1000);
            } else {
                showMsg("student_login_msg", "Invalid username or password!");
            }
        }

        // =================== Company Registration ===================
        function companyRegister() {
            let name = document.getElementById("company_reg_name").value;
            let email = document.getElementById("company_reg_email").value;
            let password = document.getElementById("company_reg_password").value;

            if (!name || !password) {
                showMsg("company_reg_msg", "Company name and password are required!");
                return;
            }

            let companies = JSON.parse(localStorage.getItem("companies")) || [];

            if (companies.find(c => c.name === name)) {
                showMsg("company_reg_msg", "Company already exists!");
                return;
            }

            companies.push({ name, email, password });
            localStorage.setItem("companies", JSON.stringify(companies));

            showMsg("company_reg_msg", "Company registered successfully!", false);

            setTimeout(() => {
                showCompanyLogin();
            }, 1500);
        }

        // =================== Company Login ===================
        function companyLogin() {
            let name = document.getElementById("company_login_name").value;
            let password = document.getElementById("company_login_password").value;

            let companies = JSON.parse(localStorage.getItem("companies")) || [];
            let found = companies.find(c => c.name === name && c.password === password);

            if (found) {
                showMsg("company_login_msg", "Login successful!", false);
                setTimeout(() => {
                    window.location.href = "company_main.html";
                }, 1000);
            } else {
                showMsg("company_login_msg", "Invalid company name or password!");
            }
        }

        // =================== Toggle Sidebar ===================
        function toggleSidebar() {
            let sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("active");
        }

        // =================== Load Dashboard ==================

        /* ---------- HIDE ALL DASHBOARDS ---------- */

        function hideAllDashboards() {

            document.getElementById("dashboardHome").classList.add("hidden");
            document.getElementById("dashboardJobs").classList.add("hidden");
            document.getElementById("dashboardStudents").classList.add("hidden");
            document.getElementById("dashboardCompanies").classList.add("hidden");
            document.getElementById("dashboardAnalytics").classList.add("hidden");
            document.getElementById("dashboardSettings").classList.add("hidden");

        }


        /* ---------- DASHBOARD NAVIGATION ---------- */

        function loadDashboardhome() {
            hideAllDashboards();
            document.getElementById("dashboardHome").classList.remove("hidden");
        }

        function loadDashboardjob() {
            hideAllDashboards();
            document.getElementById("dashboardJobs").classList.remove("hidden");
        }

        function loadDashboardstudents() {
            hideAllDashboards();
            document.getElementById("dashboardStudents").classList.remove("hidden");
        }

        function loadDashboardcompanies() {
            hideAllDashboards();
            document.getElementById("dashboardCompanies").classList.remove("hidden");
        }

        function loadDashboardanalytics() {
            hideAllDashboards();
            document.getElementById("dashboardAnalytics").classList.remove("hidden");
        }

        function loadDashboardsettings() {
            hideAllDashboards();
            document.getElementById("dashboardSettings").classList.remove("hidden");
        }
    </script>
</body>

</html>
