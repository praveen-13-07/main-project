<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - College Portal</title>
    <link rel="stylesheet" href="stylee.css">
    <link rel="stylesheet" href="new_pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="neo_brutalism.css">

    <style>
        /* Page-specific overrides only */
    </style>

</head>

<body>

    <div class="apply-page">

        <!-- Top header -->
        <div class="apply-header">

            <button class="apply-back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>

            <!-- Company logo (shown if available) -->
            <img id="ap_companyLogo" class="apply-company-logo" src="" alt="Company Logo">

            <div>
                <h1 class="apply-job-title" id="ap_jobTitle">Job Application</h1>
                <p class="apply-company-name" id="ap_companyName"></p>
            </div>

        </div>


        <!-- Application Form Card -->
        <div class="apply-form-card">

            <h2><i class="fa-solid fa-file-pen" style="color:#6366f1; margin-right:8px;"></i> Fill Your Application</h2>

            <!-- Grid fields -->
            <div class="apply-form-grid">

                <div class="apply-form-group">
                    <label>Full Name *</label>
                    <input type="text" id="ap_name" placeholder="e.g. Arjun Kumar">
                </div>

                <div class="apply-form-group">
                    <label>College Name *</label>
                    <input type="text" id="ap_college" placeholder="e.g. VIT University">
                </div>

                <div class="apply-form-group">
                    <label>Department *</label>
                    <input type="text" id="ap_dept" placeholder="e.g. Computer Science">
                </div>

                <div class="apply-form-group">
                    <label>CGPA *</label>
                    <input type="text" id="ap_cgpa" placeholder="e.g. 8.5">
                </div>

                <div class="apply-form-group">
                    <label>Experience</label>
                    <input type="text" id="ap_experience" placeholder="e.g. 1 year internship at TCS">
                </div>

                <div class="apply-form-group">
                    <label>Preferred Location *</label>
                    <input type="text" id="ap_location" placeholder="e.g. Bangalore">
                </div>

                <div class="apply-form-group">
                    <label>Phone Number *</label>
                    <input type="text" id="ap_phone" placeholder="e.g. +91 9876543210">
                </div>

                <div class="apply-form-group">
                    <label>Email Address *</label>
                    <input type="email" id="ap_email" placeholder="e.g. arjun@college.edu">
                </div>

            </div>

            <!-- Full-width fields -->
            <div class="apply-form-group" style="margin-top: 18px;">
                <label>Skills / Cover Letter</label>
                <textarea id="ap_skills" placeholder="Tell us about your skills, projects, and why you are the right fit for this job..."></textarea>
            </div>

            <div class="apply-form-group" style="margin-top: 14px;">
                <label>Upload Resume * (PDF, DOC, DOCX)</label>
                <input type="file" id="ap_resume" accept=".pdf,.doc,.docx" style="padding: 7px;">
            </div>

            <!-- Submit button -->
            <button class="apply-submit-btn" onclick="ap_submitApplication()">
                <i class="fa-solid fa-paper-plane"></i> Submit Application
            </button>

            <!-- Messages -->
            <div class="apply-success-msg" id="ap_successMsg">
                ✅ Applied successfully! Your application has been submitted.
            </div>

            <div class="apply-error-msg" id="ap_errorMsg">
                ⚠️ Please fill all required fields (marked with *)
            </div>

        </div>

    </div>


    <script>

        // =================== Read Job and Company from URL ===================
        function ap_readUrlParams() {

            var params  = new URLSearchParams(window.location.search);
            var jobTitle = params.get("job")     || "Job";
            var company  = params.get("company") || "";
            var logoUrl  = params.get("logo")    || "";

            // Show job title and company in header
            document.getElementById("ap_jobTitle").innerText = jobTitle;

            if (company) {
                document.getElementById("ap_companyName").innerText = "at " + company;
            }

            // Show company logo if available
            if (logoUrl) {
                var logoEl = document.getElementById("ap_companyLogo");
                logoEl.src = decodeURIComponent(logoUrl);
                logoEl.style.display = "block";
            }

            // Store for use in submit
            window.ap_jobTitle   = jobTitle;
            window.ap_companyName = company;
        }


        // =================== Submit Application ===================
        function ap_submitApplication() {

            var name        = document.getElementById("ap_name").value.trim();
            var college     = document.getElementById("ap_college").value.trim();
            var dept        = document.getElementById("ap_dept").value.trim();
            var cgpa        = document.getElementById("ap_cgpa").value.trim();
            var location    = document.getElementById("ap_location").value.trim();
            var phone       = document.getElementById("ap_phone").value.trim();
            var email       = document.getElementById("ap_email").value.trim();
            var resumeInput = document.getElementById("ap_resume");

            var successMsg = document.getElementById("ap_successMsg");
            var errorMsg   = document.getElementById("ap_errorMsg");

            // Validate required fields
            if (!name || !college || !dept || !cgpa || !location || !phone || !email) {
                errorMsg.innerText = "⚠️ Please fill all required fields (marked with *)";
                errorMsg.style.display = "block";
                successMsg.style.display = "none";
                setTimeout(function() { errorMsg.style.display = "none"; }, 3000);
                return;
            }

            // Get resume file name
            var resumeName = "Not uploaded";
            if (resumeInput.files && resumeInput.files.length > 0) {
                resumeName = resumeInput.files[0].name;
            }

            // Build the application key (same format as s_applyJob in student_main.html)
            var jobKey = window.ap_jobTitle + (window.ap_companyName ? " at " + window.ap_companyName : "");

            // Load existing applications
            var apps = JSON.parse(localStorage.getItem("s_applications")) || [];

            // Check if already applied
            var alreadyApplied = apps.find(function(a) { return a.title === jobKey; });
            if (alreadyApplied) {
                errorMsg.innerText = "⚠️ You have already applied for this job!";
                errorMsg.style.display = "block";
                setTimeout(function() { errorMsg.style.display = "none"; }, 3000);
                return;
            }

            // Get today's date
            var today = new Date();
            var dateStr = today.getDate() + "/" + (today.getMonth() + 1) + "/" + today.getFullYear();

            // Save to localStorage (same format used in student_main.html)
            apps.push({ title: jobKey, date: dateStr, status: "Pending", resume: resumeName });
            localStorage.setItem("s_applications", JSON.stringify(apps));

            // Show success message
            successMsg.style.display = "block";
            errorMsg.style.display = "none";

            // ===== Feature 7: Clear all form fields after submit =====
            document.getElementById("ap_name").value       = "";
            document.getElementById("ap_college").value    = "";
            document.getElementById("ap_dept").value       = "";
            document.getElementById("ap_cgpa").value       = "";
            document.getElementById("ap_experience").value = "";
            document.getElementById("ap_location").value   = "";
            document.getElementById("ap_phone").value      = "";
            document.getElementById("ap_email").value      = "";
            document.getElementById("ap_skills").value     = "";
            document.getElementById("ap_resume").value     = "";

            // Hide success message after 4 seconds
            setTimeout(function() {
                successMsg.style.display = "none";
            }, 4000);
        }


        // =================== On Page Load ===================
        ap_readUrlParams();

    </script>

</body>

</html>
